name: CI (Maven + MySQL)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ocean_view_reservation
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: ocean_view_reservation
      DB_USER: root
      DB_PASS: root

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Wait for MySQL to be ready
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -proot && break
            sleep 2
          done

      - name: Load Database Schema
        run: |
          mysql -h 127.0.0.1 -uroot -proot ocean_view_reservation < src/test/resources/database/schema.sql

      - name: Build and Run Tests
        run: mvn -B clean verify

      - name: Show Test Results (Debug)
        if: always()
        run: |
          ls target/surefire-reports || true
          cat target/surefire-reports/*.txt || true