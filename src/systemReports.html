<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>System Reports | Admin Dashboard</title>

<link rel="stylesheet" href="webapp/css/styles.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="webapp/js/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body class="dark-body">

<header class="top-header-admin">

<div class="logo">
<i class="fa-solid fa-hotel"></i> Ocean View Resort
</div>

<a href="logout" class="logout-btn">
<i class="fa-solid fa-right-from-bracket"></i> Logout
</a>

</header>

<aside class="sidebar-fixed">

<h3><i class="fa-solid fa-user-shield"></i> Admin Panel</h3>

<a href="adminPanel.html">
<i class="fa-solid fa-chart-line"></i> Dashboard
</a>

<a href="manageUsers.html">
<i class="fa-solid fa-users"></i> Manage Users
</a>

<a href="adminRooms.html">
<i class="fa-solid fa-bed"></i> Manage Rooms
</a>

<a href="systemReport.html" class="active">
<i class="fa-solid fa-chart-column"></i> System Reports
</a>

</aside>

<main class="dashboard-main">

<h2>
<i class="fa-solid fa-chart-column"></i> System Reports
</h2>

<div class="dashboard-card">

<h3>
<i class="fa-solid fa-file-chart-line"></i>
Report Tools
</h3>

<button class="btn" onclick="loadReport()">
<i class="fa-solid fa-rotate"></i> Generate Report
</button>

<button class="btn" onclick="exportCSV()">
<i class="fa-solid fa-file-csv"></i> Export CSV
</button>

<button class="btn" onclick="exportPDF()">
<i class="fa-solid fa-file-pdf"></i> Export PDF
</button>

</div>

<div class="charts-row">

<div class="dashboard-card chart-card">

<h3>
<i class="fa-solid fa-chart-line"></i>
Revenue Trend (Last 30 Days)
</h3>

<canvas id="revenueChart" height="80"></canvas>

</div>

<div class="dashboard-card chart-card">

<h3>
<i class="fa-solid fa-bed"></i>
Room Occupancy Trend
</h3>

<canvas id="occupancyChart" height="80"></canvas>

</div>

<div class="dashboard-card chart-card">

<h3>
<i class="fa-solid fa-chart-area"></i>
Booking Trend 
</h3>

<canvas id="bookingTrendChart" height="100"></canvas>
</div>
</div>

</main>

<script>

let reportData = {};
let revenueChartInstance = null;
let occupancyChartInstance = null;
let bookingChartInstance = null;

function loadReport() {
	fetch("api/reports").then(r => r.json()).then(data => {
		reportData = data;
		renderRevenueChart(data);
		renderOccupancyChart(data);
		renderBookingTrend(data);
	});
}

function renderRevenueChart(data) {
	const ctx = document.getElementById("revenueChart");
	if (revenueChartInstance) revenueChartInstance.destroy();
	revenueChartInstance = new Chart(ctx, {
		type: "line",
		data: {
			labels: data.revenueLabels,
			datasets: [{
				label: "Revenue (LKR)",
				data: data.revenueChart,
				borderWidth: 3,
				tension: 0.3
			}]
		}
	});
}

function renderOccupancyChart(data) {
	const ctx = document.getElementById("occupancyChart");
	if (occupancyChartInstance) occupancyChartInstance.destroy();
	occupancyChartInstance = new Chart(ctx, {
		type: "bar",
		data: {
			labels: data.revenueLabels,
			datasets: [{
				label: "Occupied Rooms",
				data: data.occupancyTrend,
				borderWidth: 1
			}]
		}
	});
}

function renderBookingTrend(data) {
	const ctx = document.getElementById("bookingTrendChart");
	if (bookingChartInstance) bookingChartInstance.destroy();
	bookingChartInstance = new Chart(ctx, {
		type: "line",
		data: {
			labels: data.revenueLabels,
			datasets: [{
				label: "Bookings",
				data: data.bookingTrend,
				borderWidth: 3,
				tension: 0.3
			}, {
				label: "Check-In",
				data: data.checkInTrend,
				borderWidth: 3,
				tension: 0.3
			}, {
				label: "Check-Out",
				data: data.checkOutTrend,
				borderWidth: 3,
				tension: 0.3
			}]
		}
	});
}

function exportCSV() {
	let csv = "";
	csv += "Ocean View Resort System Report\n";
	csv += "Last 30 Days Report\n";
	csv += "Generated," + new Date().toLocaleDateString() + "\n\n";
	csv += "Date,Revenue (LKR),Occupied Rooms,Bookings,Check-In,Check-Out\n";
	let totalRevenue = 0;
	let totalBookings = 0;
	for (let i = 0; i < reportData.revenueLabels.length; i++) {
		const revenue = reportData.revenueChart[i] || 0;
		const bookings = reportData.bookingTrend[i] || 0;
		totalRevenue += revenue;
		totalBookings += bookings;
		csv += reportData.revenueLabels[i] + "," + revenue + "," + (reportData.occupancyTrend[i] || 0) + "," + bookings + "," + (reportData.checkInTrend[i] || 0) + "," + (reportData.checkOutTrend[i] || 0) + "\n";
	}
	csv += "\n";
	csv += "Summary\n";
	csv += "Total Revenue (30 Days)," + totalRevenue + "\n";
	csv += "Total Bookings (30 Days)," + totalBookings + "\n";
	const blob = new Blob([csv], {
		type: "text/csv"
	});
	const url = window.URL.createObjectURL(blob);
	const link = document.createElement("a");
	link.href = url;
	link.download = "OceanView_30_Days_System_Report.csv";
	document.body.appendChild(link);
	link.click();
	document.body.removeChild(link);
}

function exportPDF() {
	const {
		jsPDF
	} = window.jspdf;
	const doc = new jsPDF();
	let y = 20;
	doc.setFontSize(20);
	doc.text("Ocean View Resort", 105, y, {
		align: "center"
	});
	y += 8;
	doc.setFontSize(14);
	doc.text("System Report - Last 30 Days", 105, y, {
		align: "center"
	});
	y += 8;
	const today = new Date().toLocaleDateString();
	doc.setFontSize(10);
	doc.text("Generated: " + today, 105, y, {
		align: "center"
	});
	y += 15;
	doc.setFontSize(11);
	doc.setFont(undefined, "bold");
	doc.text("Date", 15, y);
	doc.text("Revenue", 45, y);
	doc.text("Rooms", 80, y);
	doc.text("Bookings", 105, y);
	doc.text("Check-In", 135, y);
	doc.text("Check-Out", 165, y);
	doc.setFont(undefined, "normal");
	y += 6;
	doc.line(10, y, 200, y);
	y += 6;
	for (let i = 0; i < reportData.revenueLabels.length; i++) {
		doc.text(reportData.revenueLabels[i], 15, y);
		doc.text("LKR " + (reportData.revenueChart[i] || 0), 45, y);
		doc.text(String(reportData.occupancyTrend[i] || 0), 80, y);
		doc.text(String(reportData.bookingTrend[i] || 0), 105, y);
		doc.text(String(reportData.checkInTrend[i] || 0), 135, y);
		doc.text(String(reportData.checkOutTrend[i] || 0), 165, y);
		y += 8;
		if (y > 270) {
			doc.addPage();
			y = 20;
		}
	}
	doc.setFontSize(9);
	doc.text("Ocean View Resort – Galle", 105, 290, {
		align: "center"
	});
	doc.save("OceanView_30_Days_System_Report.pdf");
}
window.onload = loadReport;

</script>

<footer class="dashboard-footer">

<p><strong>Authorized Staff &amp; Admin Only</strong></p>
<p>© 2026 Ocean View Resort – Galle</p>

</footer>

</body>
</html>
