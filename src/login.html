<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Ocean View Resort</title>

<link rel="stylesheet" href="webapp/css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>

<body>

<div class="hero-bg"></div>
<div class="particles" id="particles"></div>

<!-- ===== HEADER ===== -->
<div class="login-header">
    <h1><i class="fa-solid fa-hotel"></i> Ocean View Resort</h1>
    <p>Reservation Management System</p>
</div>

<!-- ===== LOGIN ===== -->
<div class="login-wrapper">

<div class="login-card">

<div class="login-title">
    <i class="fa-solid fa-user-lock"></i>
    <h2>System Login</h2>
    <p>Staff &amp; Administrator Access</p>
</div>

<div id="errorBox" class="error-box">
    <i class="fa-solid fa-triangle-exclamation"></i>
    Invalid username or password
</div>

<form action="login" method="post">

<div class="form-group">
    <label><i class="fa-solid fa-user"></i> Username</label>
    <input type="text" name="username" required>
</div>

<div class="form-group">
    <label><i class="fa-solid fa-lock"></i> Password</label>
    <input type="password" name="password" id="password" required>
    <i class="fa-solid fa-eye toggle-password"
       onclick="togglePassword(this)"></i>
</div>

<button class="login-btn">
    <i class="fa-solid fa-right-to-bracket"></i>
    Login
</button>

</form>

</div>
</div>


<script>

/* ===== ERROR HANDLING ===== */
const params = new URLSearchParams(window.location.search);
if (params.get("error") === "invalid") {
    document.getElementById("errorBox").style.display = "block";
}

/* ===== PASSWORD TOGGLE ===== */
function togglePassword(icon){
    const input = document.getElementById("password");
    if(input.type === "password"){
        input.type = "text";
        icon.classList.replace("fa-eye","fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.replace("fa-eye-slash","fa-eye");
    }
}

/* ===== PARTICLE GENERATOR ===== */
const particles = document.getElementById("particles");
for(let i=0;i<40;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(8+Math.random()*8)+"s";
    p.style.opacity=Math.random();
    particles.appendChild(p);
}

</script>

</body>

<div class="login-footer">
    Authorized Staff &amp; Admin Only<br>
    © 2026 Ocean View Resort – Galle
</div>

</html>
