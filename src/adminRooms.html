<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Rooms | Admin Dashboard</title>

<link rel="stylesheet" href="webapp/css/styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="dark-body">

<header class="top-header-admin">
    <div class="logo">
        <i class="fa-solid fa-hotel"></i> Ocean View Resort
    </div>
    <a href="logout" class="logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
</header>

<aside class="sidebar-fixed">
    <h3><i class="fa-solid fa-user-shield"></i> Admin Panel</h3>

    <a href="adminPanel.html">
        <i class="fa-solid fa-chart-line"></i> Dashboard
    </a>

    <a href="manageUsers.html">
        <i class="fa-solid fa-users"></i> Manage Users
    </a>

    <a href="adminRooms.html" class="active">
        <i class="fa-solid fa-bed"></i> Manage Rooms
    </a>
    <a href="systemReports.html">
        <i class="fa-solid fa-chart-column"></i> System Reports
    </a>
</aside>

<main class="dashboard-main">

<h2><i class="fa-solid fa-bed"></i> Room Management</h2>

<div class="stats-row">
    <div class="stat-card">
        <i class="fa-solid fa-building"></i>
        <h2 id="totalRooms">0</h2>
        <p>Total Rooms</p>
    </div>

    <div class="stat-card">
        <i class="fa-solid fa-door-open"></i>
        <h2 id="availableCount">0</h2>
        <p>Available</p>
    </div>

    <div class="stat-card">
        <i class="fa-solid fa-bed"></i>
        <h2 id="occupiedCount">0</h2>
        <p>Occupied</p>
    </div>
</div>

<div class="message success" id="successBox" style="display:none;"></div>
<div class="message error" id="errorBox" style="display:none;"></div>

<div class="dashboard-card">
<h3><i class="fa-solid fa-plus"></i> Add Room</h3>

<div class="form-group">
<input type="text" id="typeName" placeholder="Room Type">
</div>

<div class="form-group">
<input type="number" id="price" placeholder="Price">
</div>

<div class="form-group">
<input type="text" id="roomNumber" placeholder="Room Number">
</div>

<button class="btn" onclick="addRoom()">
<i class="fa-solid fa-plus"></i> Add Room
</button>
</div>

<h3 style="margin-top:30px;">
<i class="fa-solid fa-list"></i> Room List
</h3>

<div class="search-box">
<input type="text" id="searchInput"
       placeholder="Search room..."
       onkeyup="filterRooms()">
</div>

<div class="dashboard-card">
<table class="data-table">
<thead>
<tr>
    <th>ID</th>
    <th>Room</th>
    <th>Type</th>
    <th>Price</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>
<tbody id="roomTable"></tbody>
</table>
</div>

</main>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3><i class="fa-solid fa-pen"></i> Edit Room</h3>

        <input type="hidden" id="editRoomId">

        <input type="text" id="editType" placeholder="Room Type">
        <input type="number" id="editPrice" placeholder="Price">
        <input type="text" id="editNumber" placeholder="Room Number">

        <div class="modal-actions">
            <button class="btn danger" onclick="closeModal()">Cancel</button>
            <button class="btn" onclick="updateRoom()">Update</button>
        </div>
    </div>
</div>

<script>

let roomData = [];

const typeNameInput = document.getElementById("typeName");
const priceInput = document.getElementById("price");
const roomNumberInput = document.getElementById("roomNumber");

function showSuccess(msg){
    const box = document.getElementById("successBox");
    box.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${msg}`;
    box.style.display = "block";
    setTimeout(()=> box.style.display="none",3000);
}

function showError(msg){
    const box = document.getElementById("errorBox");
    box.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> ${msg}`;
    box.style.display = "block";
    setTimeout(()=> box.style.display="none",3000);
}

function addRoom(){

    const typeName = typeNameInput.value.trim();
    const price = priceInput.value.trim();
    const roomNumber = roomNumberInput.value.trim();

    if(!typeName || !price || !roomNumber){
        showError("All fields are required");
        return;
    }

    fetch("admin/rooms",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"action=add"
            +"&typeName="+encodeURIComponent(typeName)
            +"&price="+encodeURIComponent(price)
            +"&roomNumber="+encodeURIComponent(roomNumber)
    })
    .then(r=>r.json())
    .then(res=>{
        if(res.success){
            showSuccess(res.message);
            typeNameInput.value="";
            priceInput.value="";
            roomNumberInput.value="";
            loadRooms();
        } else showError(res.message);
    });
}

function loadRooms(){
    fetch("admin/rooms")
    .then(r=>r.json())
    .then(data=>{
        roomData=data;
        renderRooms(data);
        updateStats();
    });
}

function renderRooms(data){
    const table=document.getElementById("roomTable");
    table.innerHTML="";

    data.forEach(r=>{
        table.innerHTML+=`
        <tr>
            <td>${r.id}</td>
            <td>${r.number}</td>
            <td>${r.type}</td>
            <td>LKR ${Number(r.price).toLocaleString()}</td>
            <td>
                <span class="badge ${r.status==='AVAILABLE'?'success':'warning'}">
                    ${r.status}
                </span>
            </td>
            <td>
                <button class="btn"
                    onclick="openEditModal(${r.id}, '${r.type}', ${r.price}, '${r.number}')">
                    <i class="fa-solid fa-pen"></i>
                </button>

                <button class="btn danger"
                    onclick="deleteRoom(${r.id})">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </td>
        </tr>`;
    });
}

function openEditModal(id,type,price,number){
    document.getElementById("editRoomId").value=id;
    document.getElementById("editType").value=type;
    document.getElementById("editPrice").value=price;
    document.getElementById("editNumber").value=number;

    document.getElementById("editModal").style.display="block";
}

function closeModal(){
    document.getElementById("editModal").style.display="none";
}

function updateRoom(){
    const id=document.getElementById("editRoomId").value;
    const type=document.getElementById("editType").value.trim();
    const price=document.getElementById("editPrice").value.trim();
    const number=document.getElementById("editNumber").value.trim();

    if(!type || !price || !number){
        showError("All fields are required");
        return;
    }

    fetch("admin/rooms",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"action=update"
            +"&roomId="+id
            +"&typeName="+encodeURIComponent(type)
            +"&price="+encodeURIComponent(price)
            +"&roomNumber="+encodeURIComponent(number)
    })
    .then(r=>r.json())
    .then(res=>{
        if(res.success){
            showSuccess(res.message);
            closeModal();
            loadRooms();
        } else showError(res.message);
    });
}

function deleteRoom(id){
    if(!confirm("Delete this room?")) return;

    fetch("admin/rooms",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"action=delete&roomId="+id
    })
    .then(r=>r.json())
    .then(res=>{
        if(res.success){
            showSuccess(res.message);
            loadRooms();
        } else showError(res.message);
    });
}

function filterRooms(){
    const term=searchInput.value.toLowerCase();
    renderRooms(roomData.filter(r=>
        r.number.toLowerCase().includes(term)
        || r.type.toLowerCase().includes(term)
    ));
}

function updateStats(){
    totalRooms.textContent=roomData.length;
    availableCount.textContent=roomData.filter(r=>r.status==="AVAILABLE").length;
    occupiedCount.textContent=roomData.filter(r=>r.status==="OCCUPIED").length;
}

window.onload=loadRooms;
const totalRoomsEl = document.getElementById("totalRooms");
const availableCountEl = document.getElementById("availableCount");
const occupiedCountEl = document.getElementById("occupiedCount");

function animateCount(element, target) {

    let start = 0;
    const duration = 800;
    const frameRate = 20;
    const totalFrames = duration / frameRate;
    const increment = target / totalFrames;

    const counter = setInterval(() => {
        start += increment;

        if (start >= target) {
            element.textContent = target;
            clearInterval(counter);
        } else {
            element.textContent = Math.floor(start);
        }
    }, frameRate);
}

const originalUpdateStats = updateStats;

updateStats = function() {

    const total = roomData.length;
    const available = roomData.filter(r=>r.status==="AVAILABLE").length;
    const occupied = roomData.filter(r=>r.status==="OCCUPIED").length;

    animateCount(totalRoomsEl, total);
    animateCount(availableCountEl, available);
    animateCount(occupiedCountEl, occupied);
};
</script>

<footer class="dashboard-footer">
    <p><strong>Authorized Staff &amp; Admin Only</strong></p>
    <p>© 2026 Ocean View Resort – Galle</p>
</footer>

</body>
</html>
