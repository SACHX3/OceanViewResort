<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Rooms | Admin Dashboard</title>

<link rel="stylesheet" href="css/styles.css">

<!-- FontAwesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>


</style>
</head>

<body class="dark-body">

<header class="top-header">
    <div class="logo">
        <i class="fa-solid fa-hotel"></i> Ocean View Resort
    </div>
    <a href="logout" class="logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
</header>

<aside class="sidebar-fixed">
    <h3><i class="fa-solid fa-user-shield"></i> Admin Panel</h3>

    <a href="adminPanel.html">
        <i class="fa-solid fa-chart-line"></i> Dashboard
    </a>

    <a href="manageUsers.html">
        <i class="fa-solid fa-users"></i> Manage Users
    </a>

    <a href="adminRooms.html" class="active">
        <i class="fa-solid fa-bed"></i> Manage Rooms
    </a>
</aside>

<main class="dashboard-main">

<h2><i class="fa-solid fa-bed"></i> Room Management</h2>

<!-- ===== STATS ===== -->
<div class="stats-row">
    <div class="stat-card">
        <i class="fa-solid fa-building"></i>
        <h2 id="totalRooms">0</h2>
        <p>Total Rooms</p>
    </div>

    <div class="stat-card">
        <i class="fa-solid fa-door-open"></i>
        <h2 id="availableCount">0</h2>
        <p>Available</p>
    </div>

    <div class="stat-card">
        <i class="fa-solid fa-bed"></i>
        <h2 id="occupiedCount">0</h2>
        <p>Occupied</p>
    </div>
</div>

<!-- ===== MESSAGES ===== -->
<div class="message success" id="successBox" style="display:none;">
    <i class="fa-solid fa-circle-check"></i> Success
</div>

<div class="message error" id="errorBox" style="display:none;">
    <i class="fa-solid fa-circle-xmark"></i> Error
</div>

<!-- ===== ADD ROOM ===== -->
<div class="dashboard-card">
<h3><i class="fa-solid fa-plus"></i> Add Room</h3>

<div class="form-group">
<input type="text" id="typeName" placeholder="Room Type">
</div>

<div class="form-group">
<input type="number" id="price" placeholder="Price Per Night">
</div>

<div class="form-group">
<input type="text" id="roomNumber" placeholder="Room Number">
</div>

<button class="btn" onclick="addRoom()">
<i class="fa-solid fa-plus"></i> Add Room
</button>
</div>

<h3 style="margin-top:30px;">
<i class="fa-solid fa-list"></i> Room List
</h3>

<div class="search-box">
<input type="text" id="searchInput"
       placeholder="Search room..."
       onkeyup="filterRooms()">
</div>

<div class="dashboard-card">
<table class="data-table">
<thead>
<tr>
    <th>ID</th>
    <th>Room</th>
    <th>Type</th>
    <th>Price</th>
    <th>Status</th>
    <th>Action</th>
</tr>
</thead>
<tbody id="roomTable"></tbody>
</table>
</div>

</main>

<script>
let roomData = [];
let counterIntervals = {};
function showSuccess(msg){
    const successBox = document.getElementById("successBox");
    const errorBox = document.getElementById("errorBox");

    successBox.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${msg}`;
    successBox.style.display = "block";
    errorBox.style.display = "none";

    setTimeout(() => successBox.style.display = "none", 3000);
}

function showError(msg){
    const successBox = document.getElementById("successBox");
    const errorBox = document.getElementById("errorBox");

    errorBox.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> ${msg}`;
    errorBox.style.display = "block";
    successBox.style.display = "none";

    setTimeout(() => errorBox.style.display = "none", 3000);
}

function addRoom(){

    const typeName = document.getElementById("typeName").value.trim();
    const price = document.getElementById("price").value;
    const roomNumber = document.getElementById("roomNumber").value.trim();

    if(!typeName || !price || !roomNumber){
        showError("All fields are required");
        return;
    }

    fetch("admin/rooms",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:
          "action=add" +
          "&typeName=" + encodeURIComponent(typeName) +
          "&price=" + price +
          "&roomNumber=" + encodeURIComponent(roomNumber)
    })
    .then(r=>r.json())
    .then(res=>{
        if(res.success){
            showSuccess(res.message);
            document.getElementById("typeName").value = "";
            document.getElementById("price").value = "";
            document.getElementById("roomNumber").value = "";

            loadRooms();
        }else{
            showError(res.message);
        }
    });
}

function loadRooms(){
    fetch("admin/rooms")
    .then(r=>r.json())
    .then(data=>{
        roomData = data;
        renderRooms(data);
        updateStats();
    });
}

function renderRooms(data){
    const table = document.getElementById("roomTable");
    table.innerHTML="";

    data.forEach(r=>{
        table.innerHTML+=`
        <tr>
            <td>${r.id}</td>
            <td>${r.number}</td>
            <td>${r.type}</td>
            <td>LKR ${Number(r.price).toLocaleString()}</td>
            <td>
                <span class="badge ${r.status==='AVAILABLE'?'success':'warning'}">
                    ${r.status}
                </span>
            </td>
            <td>
                <button class="btn danger"
                    onclick="deleteRoom(${r.id})">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </td>
        </tr>`;
    });
}

function deleteRoom(id){
    if(!confirm("Delete this room?")) return;

    fetch("admin/rooms",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body:"action=delete&roomId="+id
    })
    .then(r=>r.json())
    .then(res=>{
        if(res.success){
            showSuccess(res.message);
            loadRooms();
        }else{
            showError(res.message);
        }
    });
}

function filterRooms(){
    const term = document.getElementById("searchInput").value.toLowerCase();

    const filtered = roomData.filter(r =>
        r.number.toLowerCase().includes(term) ||
        r.type.toLowerCase().includes(term)
    );

    renderRooms(filtered);
}

function animateCounter(id, endValue){

    const element = document.getElementById(id);

    if(counterIntervals[id]){
        clearInterval(counterIntervals[id]);
    }

    let start = 0;
    const duration = 500;
    const step = Math.max(1, Math.floor(endValue / 20));

    counterIntervals[id] = setInterval(() => {
        start += step;

        if(start >= endValue){
            start = endValue;
            clearInterval(counterIntervals[id]);
        }

        element.textContent = start;

    }, 20);
}

function updateStats(){

    const total = roomData.length;
    const available = roomData.filter(r=>r.status==="AVAILABLE").length;
    const occupied = roomData.filter(r=>r.status==="OCCUPIED").length;

    animateCounter("totalRooms", total);
    animateCounter("availableCount", available);
    animateCounter("occupiedCount", occupied);
}

window.onload = loadRooms;

</script>

</body>

<footer class="dashboard-footer">
    <p><strong>Authorized Staff & Admin Only</strong></p>
    <p>© 2026 Ocean View Resort – Galle</p>
</footer>

</html>
