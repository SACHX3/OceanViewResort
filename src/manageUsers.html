<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Users | Admin Dashboard</title>

<link rel="stylesheet" href="css/styles.css">

<!-- FontAwesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="dark-body">

<!-- ===== HEADER ===== -->
<header class="top-header">
    <div class="logo">
        <i class="fa-solid fa-hotel"></i> Ocean View Resort
    </div>
    <a href="logout" class="logout-btn">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
    </a>
</header>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar-fixed">
    <h3><i class="fa-solid fa-user-shield"></i> Admin Panel</h3>

    <a href="adminPanel.html">
        <i class="fa-solid fa-chart-line"></i> Dashboard
    </a>

    <a href="manageUsers.html" class="active">
        <i class="fa-solid fa-users"></i> Manage Users
    </a>

    <a href="adminRooms.html">
        <i class="fa-solid fa-bed"></i> Manage Rooms
    </a>
</aside>

<!-- ===== MAIN ===== -->
<main class="dashboard-main">

<h2><i class="fa-solid fa-users"></i> User Management</h2>

<!-- ===== STATS ===== -->
<div class="stats-row">
    <div class="stat-card">
        <i class="fa-solid fa-users"></i>
        <h2 id="totalUsers">0</h2>
        <p>Total Users</p>
    </div>

    <div class="stat-card">
        <i class="fa-solid fa-user-shield"></i>
        <h2 id="adminCount">0</h2>
        <p>Admins</p>
    </div>

    <div class="stat-card">
        <i class="fa-solid fa-user-tie"></i>
        <h2 id="staffCount">0</h2>
        <p>Staff Members</p>
    </div>
</div>

<!-- ===== STATUS MESSAGES ===== -->
<div class="message success" id="successMsg" style="display:none;">
    <i class="fa-solid fa-circle-check"></i> Success
</div>

<div class="message error" id="errorMsg" style="display:none;">
    <i class="fa-solid fa-circle-xmark"></i> Error
</div>

<!-- ===== CREATE USER ===== -->
<div class="dashboard-card">
<h3><i class="fa-solid fa-user-plus"></i> Create New User</h3>

<form action="addUser" method="post">

<div class="form-group">
<label>Username</label>
<input type="text" name="username" required>
</div>

<div class="form-group">
<label>Full Name</label>
<input type="text" name="fullName" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" name="password" required>
</div>

<div class="form-group">
<label>Role</label>
<select name="role" required>
<option value="STAFF">Staff</option>
<option value="ADMIN">Admin</option>
</select>
</div>

<button class="btn">
<i class="fa-solid fa-plus"></i> Create User
</button>

</form>
</div>

<!-- ===== USER LIST ===== -->
<h3 style="margin-top:30px;">
<i class="fa-solid fa-list"></i> Existing Users
</h3>

<div class="dashboard-card">

<table class="data-table">
<thead>
<tr>
    <th>Username</th>
    <th>Full Name</th>
    <th>Role</th>
    <th>Actions</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

</div>

</main>

<script>

function animateCounter(id, value){
    const el = document.getElementById(id);
    let start = 0;
    const duration = 600;
    const increment = value / (duration / 20);

    const counter = setInterval(()=>{
        start += increment;
        if(start >= value){
            start = value;
            clearInterval(counter);
        }
        el.textContent = Math.floor(start);
    },20);
}

function loadUsers(){

fetch("api/users")
.then(r=>r.json())
.then(data=>{

    const table=document.getElementById("userTable");
    table.innerHTML="";

    let admins=0, staff=0;

    if(!data || data.length===0){
        table.innerHTML="<tr><td colspan='4'>No users found</td></tr>";
        return;
    }

    data.forEach(u=>{
        if(u.role==="ADMIN") admins++;
        if(u.role==="STAFF") staff++;

        table.innerHTML+=`
        <tr>
            <td>${u.username}</td>
            <td>
                <input value="${u.fullName}" id="name${u.id}">
            </td>
            <td>
                <select id="role${u.id}">
                    <option value="STAFF" ${u.role==="STAFF"?"selected":""}>STAFF</option>
                    <option value="ADMIN" ${u.role==="ADMIN"?"selected":""}>ADMIN</option>
                </select>
            </td>
            <td>
                <button class="btn" onclick="updateUser(${u.id})">
                    <i class="fa-solid fa-pen"></i>
                </button>
                <button class="btn danger" onclick="deleteUser(${u.id})">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </td>
        </tr>`;
    });

    /* Animate Counters */
    animateCounter("totalUsers", data.length);
    animateCounter("adminCount", admins);
    animateCounter("staffCount", staff);

});
}

function updateUser(id){
fetch("updateUser",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:
"userId="+id+
"&fullName="+encodeURIComponent(document.getElementById("name"+id).value)+
"&role="+document.getElementById("role"+id).value
}).then(()=>location.reload());
}

function deleteUser(id){
if(!confirm("Delete this user?")) return;

fetch("deleteUser",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"userId="+id
}).then(()=>location.reload());
}

loadUsers();

</script>

</body>

<footer class="dashboard-footer">
    <p><strong>Authorized Staff & Admin Only</strong></p>
    <p>© 2026 Ocean View Resort – Galle</p>
</footer>

</html>
