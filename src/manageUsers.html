<!DOCTYPE html>
<html>
<head>
    <title>Manage Users | Admin</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="main-header">
    <div class="header-content">
        <h1>Ocean View Resort</h1>
        <p>Manage Users</p>
    </div>
    <a href="logout" class="logout-btn">Logout</a>
</header>

<nav class="sidebar">
    <a href="adminPanel.html">Admin Panel</a>
    <a href="manageUsers.html" class="">Manage Users</a>
</nav>

<main class="main-content">

<!-- ===== STATUS MESSAGES ===== -->
<div class="message success" id="successMsg" style="display:none;">
    User operation completed successfully
</div>

<div class="message error" id="duplicateMsg" style="display:none;">
    Username already exists
</div>

<div class="message error" id="errorMsg" style="display:none;">
    Operation failed. Please try again
</div>

<h2>User Management</h2>

<!-- ================= ADD USER ================= -->
<div class="card">
    <h3>Create New User</h3>

    <form action="addUser" method="post">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Full Name</label>
        <input type="text" name="fullName" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label>Role</label>
        <select name="role" required>
            <option value="STAFF">Staff</option>
            <option value="ADMIN">Admin</option>
        </select>

        <button class="btn">Create User</button>
    </form>
</div>

<!-- ================= USER LIST ================= -->
<h3>Existing Users</h3>

<div class="card">
<table class="data-table">
    <thead>
        <tr>
            <th>Username</th>
            <th>Full Name</th>
            <th>Role</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="userTable"></tbody>
</table>
</div>

</main>

<footer class="footer">
    &copy; 2026 Ocean View Resort – Galle
</footer>

<script>
/* ================= LOAD USERS ================= */
function loadUsers() {
    fetch("api/users")
        .then(r => r.json())
        .then(data => {

            const table = document.getElementById("userTable");
            table.innerHTML = "";

            if (!data || data.length === 0) {
                table.innerHTML =
                  "<tr><td colspan='4'>No users found</td></tr>";
                return;
            }

            data.forEach(u => {
                table.innerHTML += `
                <tr>
                    <td>${u.username}</td>
                    <td>
                        <input value="${u.fullName}"
                               id="name${u.id}">
                    </td>
                    <td>
                        <select id="role${u.id}">
                            <option value="STAFF" ${u.role==="STAFF"?"selected":""}>STAFF</option>
                            <option value="ADMIN" ${u.role==="ADMIN"?"selected":""}>ADMIN</option>
                        </select>
                    </td>
                    <td>
                        <button class="btn"
                            onclick="updateUser(${u.id})">
                            Update
                        </button>
                        <button class="btn danger"
                            onclick="deleteUser(${u.id})">
                            Delete
                        </button>
                    </td>
                </tr>`;
            });
        });
}

/* ================= UPDATE USER ================= */
function updateUser(id) {

    fetch("updateUser", {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body:
            "userId=" + id +
            "&fullName=" + encodeURIComponent(document.getElementById("name"+id).value) +
            "&role=" + document.getElementById("role"+id).value
    })
    .then(() => location.href="manageUsers.html?success=true");
}

/* ================= DELETE USER ================= */
function deleteUser(id) {

    if (!confirm("Are you sure you want to delete this user?")) return;

    fetch("deleteUser", {
        method: "POST",
        headers: {"Content-Type":"application/x-www-form-urlencoded"},
        body: "userId=" + id
    })
    .then(() => location.href="manageUsers.html?success=true");
}

/* ================= STATUS HANDLING ================= */
const params = new URLSearchParams(window.location.search);

if (params.get("success") === "true")
    successMsg.style.display = "block";

if (params.get("error") === "duplicate")
    duplicateMsg.style.display = "block";

if (params.get("error") === "true")
    errorMsg.style.display = "block";

loadUsers();
</script>

</body>
</html>
